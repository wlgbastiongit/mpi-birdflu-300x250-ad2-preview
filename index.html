<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=300,height=250">
<title>MPI Bird Flu Response - 300x250 (v2, Ad 2)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 300px;
    height: 250px;
    overflow: hidden;
  }
  .banner {
    position: relative;
    width: 300px;
    height: 250px;
    cursor: pointer;
  }
  .frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .frame.active {
    opacity: 1;
  }
  .frame img.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    display: block;
  }
  .el {
    position: absolute;
    display: block;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  /* text/card elements: no independent motion - they fade in/out purely via the frame's own opacity transition */
  .static-el {
    position: absolute;
    display: block;
    opacity: 1;
  }

  /* --- shared stripe: static, sits above every frame --- */
  .stripe-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
    z-index: 5;
  }
  .stripe-wrap img {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
  }

  /* --- element placement --- */
  .birds    { left: 43.33px; top: 93.33px; width: 256.67px; height: 170px; }
  .headline { left: 7.33px;  top: 22px;    width: 229.33px; height: 97px; transform-origin: left center; }
  .text2    { left: 10px;    top: 68.33px; width: 213.33px; height: 124.33px; }
  .card3    { left: 29.67px; top: 74.33px; width: 239.67px; height: 117px; }
  .card4    { left: 30px;    top: 78px;    width: 239.33px; height: 94px; }
  .card5    { left: 29.33px; top: 72.67px; width: 240px;    height: 103.33px; }
  .card6    { left: 82.21px; top: 44.65px; width: 135.59px; height: 131.68px; }
  .cta      { left: 89.84px; top: 172px;   width: 120.33px; height: 30px; }
  .govtnz   { left: 222.67px;top: 212px;   width: 62px;     height: 23px; }

  /* --- keyframes ---
     transform only: opacity is handled separately below by a plain transition, so
     fade-in/out is always reliable regardless of whether an entrance animation is
     running (an animation being removed does not reliably hand off to a transition). */
  @keyframes riseUp {
    from { transform: translateY(450px); }
    to   { transform: translateY(0); }
  }
  @keyframes fadeRiseIn {
    from { transform: translateY(20px); }
    to   { transform: translateY(0); }
  }
  @keyframes expandIn {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  /* --- per-frame entrance timing ---
     each rule sets its own transition duration/delay (for the opacity fade-in) alongside
     a matching animation (for the transform). On exit, none of these rules match any more,
     so opacity simply falls back to the base .el transition (1s, no delay) - a plain,
     always-reliable fade out in sync with the frame. */

  /* frame 1: birds rise from beneath the frame; headline grows from nothing */
  .frame.active .birds {
    opacity: 1;
    transition: opacity 1.1s ease-in-out;
    animation: riseUp 1.1s cubic-bezier(.4,0,.2,1);
  }
  .frame.active .headline {
    opacity: 1;
    transition: opacity 0.75s ease-in-out 0.15s;
    animation: expandIn 0.75s ease-out 0.15s;
  }

  /* frames 2-5 text/cards: no element-level animation - plain fade in/out via the frame's own opacity transition */

  /* frame 6 (end card): the bird flu logo fades/rises in first and lingers on its own,
     then the CTA and GOVT.NZ logo come in together well after (matches the OG poultry banner sequencing) */
  .frame.active .card6 {
    opacity: 1;
    transition: opacity 0.8s ease-in-out 0.15s;
    animation: fadeRiseIn 0.8s ease-out 0.15s;
  }
  .frame.active .cta,
  .frame.active .govtnz {
    opacity: 1;
    transition: opacity 0.7s ease-in-out 1.8s;
    animation: fadeRiseIn 0.7s ease-out 1.8s;
  }

  .clickthrough {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="banner" id="banner">

    <div class="frame active" id="frame1">
      <img class="bg" src="images/bg-frame1.jpg" alt="">
      <img class="el birds" src="images/birds.webp" alt="">
      <img class="el headline" src="images/el-frame1_headline.png" alt="Don't let bird flu take flight">
    </div>

    <div class="frame" id="frame2">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el text2" src="images/el-frame2_text.png" alt="If you're heading outdoors, know what to do to limit the impact">
    </div>

    <div class="frame" id="frame3">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el card3" src="images/el-frame3_card.png" alt="Keep your distance. Stay away from sick or dead wildlife. Keep pets away too.">
    </div>

    <div class="frame" id="frame4">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el card4" src="images/el-frame4_card.png" alt="Keep clean. Wash your hands and clean your gear after being outdoors.">
    </div>

    <div class="frame" id="frame5">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el card5" src="images/el-frame5_card.png" alt="Know when to report. Search online for the latest advice.">
    </div>

    <div class="frame" id="frame6">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card6" src="images/el-frame6_card.png" alt="Bird flu, know what to do">
      <img class="el cta" src="images/el-frame6_cta.png" alt="Find out more">
      <img class="el govtnz" src="images/govtnz-lockup.png" alt="GOVT.NZ">
    </div>

    <div class="stripe-wrap">
      <img src="images/el-stripe.png" alt="">
    </div>

    <a class="clickthrough" id="clickthrough" href="#REPLACE_CLICK_URL" target="_blank" rel="noopener"></a>
  </div>

  <script>
    // Ad-server clickTag convention. Replace with the real destination URL before trafficking.
    var clickTag = "#REPLACE_CLICK_URL";
    document.getElementById("clickthrough").addEventListener("click", function (e) {
      e.preventDefault();
      window.open(clickTag, "_blank");
    });

    var frames = [
      document.getElementById("frame1"),
      document.getElementById("frame2"),
      document.getElementById("frame3"),
      document.getElementById("frame4"),
      document.getElementById("frame5"),
      document.getElementById("frame6")
    ];
    var durations = [3400, 4000, 4000, 3800, 4000, 4200]; // ms each frame is shown
    var maxLoops = 2; // full sequence repeats, then holds on the end card
    var index = 0;
    var loopCount = 0;

    function showFrame(i) {
      frames.forEach(function (f, idx) {
        f.classList.toggle("active", idx === i);
      });
    }

    function advance() {
      var next = index + 1;

      if (next >= frames.length) {
        loopCount++;
        if (loopCount >= maxLoops) {
          // Stay on the end card (last frame) permanently.
          return;
        }
        next = 0;
      }

      index = next;
      showFrame(index);
      setTimeout(advance, durations[index]);
    }

    setTimeout(advance, durations[0]);
  </script>
</body>
</html>
