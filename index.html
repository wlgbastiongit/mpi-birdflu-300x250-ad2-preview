<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=300,height=250">
<title>MPI Bird Flu Response - 300x250 (v2, Ad 2)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 300px;
    height: 250px;
    overflow: hidden;
  }
  .banner {
    position: relative;
    width: 300px;
    height: 250px;
    cursor: pointer;
  }
  .frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .frame.active {
    opacity: 1;
  }
  .frame img.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    display: block;
  }
  .el {
    position: absolute;
    display: block;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  /* --- shared stripe: static, sits above every frame --- */
  .stripe-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
    z-index: 5;
  }
  .stripe-wrap img {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
  }

  /* --- element placement --- */
  .birds       { left: 43.33px; top: 93.33px; width: 256.67px; height: 170px; }
  .headline    { left: 7.33px;  top: 22px;    width: 229.33px; height: 97px; transform-origin: left center; }

  .card2body   { left: 29.67px; top: 74.33px; width: 239.67px; height: 117px; }
  .card2icon   { left: 26px;    top: 81.66px; width: 83.67px;  height: 83.67px; }
  .card3body   { left: 30px;    top: 78px;    width: 239.33px; height: 94px; }
  .card3icon   { left: 26px;    top: 83.33px; width: 80.67px;  height: 80.67px; }
  .card4body   { left: 29.33px; top: 72.67px; width: 240px;    height: 103.33px; }
  .card4icon   { left: 26px;    top: 84.67px; width: 78.67px;  height: 78.67px; }

  .card5       { left: 82.21px; top: 44.65px; width: 135.59px; height: 131.68px; }
  .cta         { left: 89.84px; top: 172px;   width: 120.33px; height: 30px; }
  .govtnz      { left: 222.67px;top: 212px;   width: 62px;     height: 23px; }

  /* --- keyframes --- */
  @keyframes riseUp {
    from { transform: translateY(450px); }
    to   { transform: translateY(0); }
  }
  @keyframes fadeRiseIn {
    from { transform: translateY(20px); }
    to   { transform: translateY(0); }
  }
  @keyframes expandIn {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }
  @keyframes iconFlyIn {
    from { transform: translate(-90px, -26px) rotate(-22deg) scale(0.55); }
    to   { transform: translate(0, 0) rotate(0) scale(1); }
  }

  /* --- per-frame entrance timing --- */
  .frame.active .birds {
    opacity: 1;
    transition: opacity 1.6s ease-in-out;
    animation: riseUp 1.6s cubic-bezier(.4,0,.2,1);
  }
  .frame.active .headline {
    opacity: 1;
    transition: opacity 1.1s ease-in-out 1.75s;
    animation: expandIn 1.1s ease-out 1.75s;
  }

  .frame.active .card2icon,
  .frame.active .card3icon,
  .frame.active .active .card4icon {
    opacity: 1;
    transition: opacity 0.9s ease-out;
    animation: iconFlyIn 0.9s cubic-bezier(.2,.8,.3,1.15);
  }
  .frame.active .card2body,
  .frame.active .card3body,
  .frame.active .card4body {
    opacity: 1;
    transition: opacity 0.9s ease-in-out 1.05s;
    animation: fadeRiseIn 0.9s ease-out 1.05s;
  }

  .frame.active .card5 {
    opacity: 1;
    transition: opacity 0.8s ease-in-out 0.15s;
    animation: fadeRiseIn 0.8s ease-out 0.15s;
  }
  .frame.active .cta,
  .frame.active .govtnz {
    opacity: 1;
    transition: opacity 0.7s ease-in-out 1.8s;
    animation: fadeRiseIn 0.7s ease-out 1.8s;
  }

  .clickthrough {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="banner" id="banner">

    <div class="frame" id="frame1">
      <img class="bg" src="images/bg-frame1.jpg" alt="">
      <img class="el birds" src="images/birds.webp" alt="">
      <img class="el headline" src="images/el-frame1_headline.png" alt="Don't let bird flu take flight">
    </div>

    <div class="frame" id="frame2">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card2body" src="images/el-frame2_cardbody.png" alt="Keep your distance. Stay away from sick or dead wildlife. Keep pets away too.">
      <img class="el card2icon" src="images/el-frame2_icon.png" alt="">
    </div>

    <div class="frame" id="frame3">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card3body" src="images/el-frame3_cardbody.png" alt="Keep clean. Wash your hands and clean your gear after being outdoors.">
      <img class="el card3icon" src="images/el-frame3_icon.png" alt="">
    </div>

    <div class="frame" id="frame4">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card4body" src="images/el-frame4_cardbody.png" alt="Know when to report. Search online for the latest advice.">
      <img class="el card4icon" src="images/el-frame4_icon.png" alt="">
    </div>

    <div class="frame" id="frame5">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card5" src="images/el-frame5_card.png" alt="Bird flu, know what to do">
      <img class="el cta" src="images/el-frame5_cta.png" alt="Find out more">
      <img class="el govtnz" src="images/govtnz-lockup.png" alt="GOVT.NZ">
    </div>

    <div class="stripe-wrap">
      <img src="images/el-stripe.png" alt="">
    </div>

    <!-- Adapted: Removed hardcoded placeholder href attribute so it relies on the script -->
    <a class="clickthrough" id="clickthrough" target="_blank" rel="noopener"></a>
  </div>

  <script>
    // Adapted: Standard global platform variable. 
    // Fallback landing page supplied if ad server doesn't override it.
    var clickTag = "https://www.biosecurity.govt.nz"; 

    // Adapted: Ad server script compatibility for case sensitivity protection
    var clickThroughTarget = document.getElementById("clickthrough");
    if (clickThroughTarget) {
        clickThroughTarget.addEventListener("click", function (e) {
          e.preventDefault();
          window.open(window.clickTag || clickTag, "_blank");
        });
    }

    var frames = [
      document.getElementById("frame1"),
      document.getElementById("frame2"),
      document.getElementById("frame3"),
      document.getElementById("frame4"),
      document.getElementById("frame5")
    ];
    var durations = [4200, 6900, 5900, 5900, 5200]; 
    var maxLoops = 2; 
    var index = 0;
    var loopCount = 0;

    function showFrame(i) {
      frames.forEach(function (f, idx) {
        f.classList.toggle("active", idx === i);
      });
    }

    function advance() {
      var next = index + 1;

      if (next >= frames.length) {
        loopCount++;
        if (loopCount >= maxLoops) {
          return;
        }
        next = 0;
      }

      index = next;
      showFrame(index);
      setTimeout(advance, durations[index]);
    }

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        showFrame(0);
        setTimeout(advance, durations[0]);
      });
    });
  </script>
</body>
</html>
